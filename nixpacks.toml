[providers]
  # Menggunakan PHP sebagai provider utama dan Node untuk proses build (Vite/Inertia)
  php = true
  node = true

[phases.setup]
  nixPkgs = ["php84", "php84Packages.composer", "nodejs_20"]

[phases.install]
  cmds = [
    "npm install",
    "composer install --no-dev --optimize-autoloader --no-interaction"
  ]

[phases.build]
  cmds = [
    "npm run build"
  ]

[start]
  # Biarkan kosong agar Nixpacks memakai perintah default PHP-FPM + Nginx (Nginx akan ditangani sepenuhnya oleh Nixpacks Laravel template).
  # Ini mencegah issue duplicate location block Nginx.
